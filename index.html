    <!-- 1. 載入 Tailwind CSS -->

    <!-- 2. 改用最穩定的 jsDelivr CDN 載入 React -->

    <style>
        body { -webkit-user-select: none; user-select: none; }

        #startup-error { color: #dc2626; font-family: monospace; padding: 20px; white-space: pre-wrap; font-size: 14px; text-align: left; }

    <!-- 防白屏機制：預設顯示載入中，若成功會被 React 覆蓋；若失敗則顯示錯誤 -->
    <div id="root">
        <div style="padding: 40px; text-align: center; font-family: sans-serif; max-width: 600px; margin: 0 auto;">
            <h2 style="color: #4f46e5; font-size: 24px; font-weight: bold; margin-bottom: 10px;">系統載入中...</h2>
            <p style="color: #64748b;">如果您長時間看到此畫面，請檢查下方是否有紅色錯誤訊息：</p>
            <div id="startup-error" style="background: #fee2e2; margin-top: 20px; border-radius: 8px; border: 1px solid #f87171;"></div>
        </div>
    </div>

    <!-- 捕捉全域錯誤，直接顯示在畫面上 -->
    <script>
        window.addEventListener('error', function(e) {
            var errDiv = document.getElementById('startup-error');
            if(errDiv) errDiv.innerText += '[網路/腳本錯誤] ' + e.message + '\n';
        });
        window.addEventListener('unhandledrejection', function(e) {
            var errDiv = document.getElementById('startup-error');
            if(errDiv) errDiv.innerText += '[非同步錯誤] ' + e.reason + '\n';
        });

        // 強制殺死所有舊的 Service Worker (破除快取卡死)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>

        class ErrorBoundary extends window.React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null, info: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { this.setState({ info }); }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{padding: '30px', color: '#991b1b', background: '#fef2f2', minHeight: '100vh'}}>
                            <h2 style={{fontSize: '24px', fontWeight: 'bold'}}>發生意外錯誤 (React Crash)</h2>
                            <p>請將以下錯誤回報給開發者：</p>
                            <pre style={{marginTop: '20px', background: 'white', padding: '15px', overflowX: 'auto'}}>
                                {this.state.error && this.state.error.toString()}<br/>
                                {this.state.info && this.state.info.componentStack}
                            </pre>

                    );

            '脈口一盛而躁（補三焦瀉心包）': { tonify: { point: '支溝', alias: '中渚', side: 'left', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '大陵', side: 'right', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } },
            '脈口二盛而躁（補小腸瀉心）': { tonify: { point: '陽谷', alias: '後溪', side: 'left', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '神門', side: 'right', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } },
            '脈口三盛而躁（補大腸瀉肺）': { tonify: { point: '商陽', alias: '曲池', side: 'left', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '尺澤', side: 'right', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } }
          },
          female: {
            '人迎一盛（補肝瀉膽）': { tonify: { point: '曲泉', side: 'left', desc: '遠心、淺刺15度、陽數、順轉' }, sedate: { point: '足臨泣', alias: '陽輔', side: 'right', desc: '向心、深刺45度、陰數、逆轉' } },
            '人迎二盛（補腎瀉膀胱）': { tonify: { point: '復溜', side: 'left', desc: '遠心、淺刺15度、陽數、順轉' }, sedate: { point: '通谷', alias: '束骨', side: 'right', desc: '向心、深刺45度、陰數、逆轉' } },
            '人迎三盛（補脾瀉胃）': { tonify: { point: '大都', side: 'left', desc: '遠心、淺刺15度、陽數、順轉' }, sedate: { point: '足三里', alias: '厲兌', side: 'right', desc: '向心、深刺45度、陰數、逆轉' } },
            '人迎一盛而躁（補心包瀉三焦）': { tonify: { point: '中衝', side: 'right', desc: '遠心、淺刺15度、陽數、順轉' }, sedate: { point: '支溝', alias: '天井', side: 'left', desc: '向心、深刺45度、陰數、逆轉' } },
            '人迎二盛而躁（補心瀉小腸）': { tonify: { point: '少衝', side: 'right', desc: '遠心、淺刺15度、陽數、順轉' }, sedate: { point: '陽谷', alias: '小海', side: 'left', desc: '向心、深刺45度、陰數、逆轉' } },
            '人迎三盛而躁（補肺瀉大腸）': { tonify: { point: '太淵', side: 'right', desc: '遠心、淺刺15度、陽數、順轉' }, sedate: { point: '商陽', alias: '二間', side: 'left', desc: '向心、深刺45度、陰數、逆轉' } },
            '脈口一盛（補膽瀉肝）': { tonify: { point: '足臨泣', alias: '俠溪', side: 'left', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '行間', side: 'right', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } },
            '脈口二盛（補膀胱瀉腎）': { tonify: { point: '通谷', alias: '至陰', side: 'left', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '湧泉', side: 'right', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } },
            '脈口三盛（補胃瀉脾）': { tonify: { point: '足三里', alias: '解溪', side: 'left', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '商丘', side: 'right', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } },
            '脈口一盛而躁（補三焦瀉心包）': { tonify: { point: '支溝', alias: '中渚', side: 'right', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '大陵', side: 'left', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } },
            '脈口二盛而躁（補小腸瀉心）': { tonify: { point: '陽谷', alias: '後溪', side: 'right', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '神門', side: 'left', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } },
            '脈口三盛而躁（補大腸瀉肺）': { tonify: { point: '商陽', alias: '曲池', side: 'right', desc: '向心、淺刺15度、吐氣進針、陽數、順轉' }, sedate: { point: '尺澤', side: 'left', desc: '遠心、深刺45度、吐氣進針、陰數、逆轉' } }
          }
        };

        function AcupunctureTool() {
          const [gender, setGender] = useState('male');
          const [isBalanced, setIsBalanced] = useState(null);
          const [tangyePulse, setTangyePulse] = useState(null);
          const [tangyeState, setTangyeState] = useState(null);
          const [zhongshiPulsePos, setZhongshiPulsePos] = useState(null);
          const [isAgitated, setIsAgitated] = useState(null);
          const [zhongshiTreatment, setZhongshiTreatment] = useState(null);

          const zhongshiOptions = useMemo(() => {
            if (!zhongshiPulsePos || isAgitated === null) return [];
            if (zhongshiPulsePos === '人迎') {
              return isAgitated === 'no' 
                ? ['人迎一盛（補肝瀉膽）', '人迎二盛（補腎瀉膀胱）', '人迎三盛（補脾瀉胃）']
                : ['人迎一盛而躁（補心包瀉三焦）', '人迎二盛而躁（補心瀉小腸）', '人迎三盛而躁（補肺瀉大腸）'];
            } else {
              return isAgitated === 'no'
                ? ['脈口一盛（補膽瀉肝）', '脈口二盛（補膀胱瀉腎）', '脈口三盛（補胃瀉脾）']
                : ['脈口一盛而躁（補三焦瀉心包）', '脈口二盛而躁（補小腸瀉心）', '脈口三盛而躁（補大腸瀉肺）'];
            }
          }, [zhongshiPulsePos, isAgitated]);

          const result = useMemo(() => {
            let res = null;
            if (isBalanced === true && tangyePulse && tangyeState) {
              const rule = TANGYE_RULES[gender][tangyePulse][tangyeState];
              if (rule) {
                res = { title: '湯液針法 處方', method: `${tangyePulse} ${tangyeState}`, tonify: rule.tonify, sedate: rule.sedate };
              }
            } else if (isBalanced === false && zhongshiTreatment) {
               const rule = ZHONGSHI_RULES[gender][zhongshiTreatment];
               if (rule) {
                 res = { title: '終始針法 處方', method: zhongshiTreatment, tonify: rule.tonify, sedate: rule.sedate };
               }
            }
            return res;
          }, [gender, isBalanced, tangyePulse, tangyeState, zhongshiTreatment]);

          const handleBalanceChange = (val) => {
            setIsBalanced(val);
            setTangyePulse(null); setTangyeState(null);
            setZhongshiPulsePos(null); setIsAgitated(null); setZhongshiTreatment(null);
          };
          const handlePulsePosChange = (val) => { setZhongshiPulsePos(val); setZhongshiTreatment(null); };
          const handleAgitatedChange = (val) => { setIsAgitated(val); setZhongshiTreatment(null); };
          
          const displayActions = useMemo(() => {
            if (!result || !result.tonify || !result.sedate) return [];
            const actions = [{ type: 'tonify', ...result.tonify }, { type: 'sedate', ...result.sedate }];
            if (isBalanced === true) {
              actions.sort((a, b) => {
                const getPart = (item) => {
                     if (!item || !item.point) return 'upper';
                     const names = item.point.split('/');
                     for(let name of names) {
                         if (POINT_LOCATIONS[name]) {
                             const icon = POINT_LOCATIONS[name].icon;
                             if (icon === '✋' || icon === '💪') return 'upper';
                             if (icon === '🦵' || icon === '🦶') return 'lower';
                         }
                     }
                     return 'upper'; 
                };
                const partA = getPart(a);
                const partB = getPart(b);
                const getScore = (side, part) => {
                   if (gender === 'male') {
                     if ((side === 'left' && part === 'upper') || (side === 'right' && part === 'lower')) return 0;
                     return 1;
                   } else {
                     if ((side === 'right' && part === 'upper') || (side === 'left' && part === 'lower')) return 0;
                     return 1;
                   }
                };
                return getScore(a.side, partA) - getScore(b.side, partB);
              });
            }
            return actions;
          }, [result, isBalanced, gender]);

          const locationHints = useMemo(() => {
            if (!result) return [];
            const points = new Set();
            const extract = (item) => {
               if(!item || !item.point) return;
               const names = [item.point];
               if (item.alias) names.push(item.alias);
               names.forEach(n => n.split('/').forEach(subName => points.add(subName)));
            };
            extract(result.tonify); extract(result.sedate);
            const hints = [];
            points.forEach(p => { if (POINT_LOCATIONS[p]) hints.push({ name: p, ...POINT_LOCATIONS[p] }); });
            return hints;
          }, [result]);

          return (
            <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800 pb-20">
              <div className="max-w-4xl mx-auto space-y-6">
                <header className="bg-white p-6 rounded-xl shadow-sm border-l-4 border-indigo-500">
                  <h1 className="text-2xl font-bold flex items-center gap-2 text-indigo-900">
                    <Icons.Activity />
                    針灸臨床決策輔助工具
                  </h1>
                  <p className="text-slate-500 mt-2">湯液針法 / 內經終始針法 整合學習系統</p>
                </header>

                <section className="bg-white p-6 rounded-xl shadow-sm animate-in fade-in slide-in-from-bottom-4 duration-500">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                    病人性別
                  </h2>
                  <div className="flex gap-4">
                    <button onClick={() => setGender('male')} className={`flex-1 py-3 px-4 rounded-lg border-2 transition-all flex items-center justify-center gap-2 ${gender === 'male' ? 'border-blue-500 bg-blue-50 text-blue-700 font-bold' : 'border-slate-200 hover:border-slate-300'}`}><Icons.User /> 男</button>
                    <button onClick={() => setGender('female')} className={`flex-1 py-3 px-4 rounded-lg border-2 transition-all flex items-center justify-center gap-2 ${gender === 'female' ? 'border-pink-500 bg-pink-50 text-pink-700 font-bold' : 'border-slate-200 hover:border-slate-300'}`}><Icons.User /> 女</button>
                  </div>
                </section>

                <section className="bg-white p-6 rounded-xl shadow-sm animate-in fade-in slide-in-from-bottom-4 duration-500 delay-100">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                    雙手脈相？
                  </h2>
                  <div className="flex gap-4">
                    <button onClick={() => handleBalanceChange(true)} className={`flex-1 py-3 px-4 rounded-lg border-2 transition-all ${isBalanced === true ? 'border-teal-500 bg-teal-50 text-teal-700 font-bold' : 'border-slate-200 hover:border-slate-300'}`}>獨異 (湯液針法)</button>
                    <button onClick={() => handleBalanceChange(false)} className={`flex-1 py-3 px-4 rounded-lg border-2 transition-all ${isBalanced === false ? 'border-orange-500 bg-orange-50 text-orange-700 font-bold' : 'border-slate-200 hover:border-slate-300'}`}>陰陽不平衡 (終始針法)</button>
                  </div>
                </section>

                {isBalanced === true && (
                  <div className="space-y-6 animate-in zoom-in-95 duration-300">
                    <section className="bg-white p-6 rounded-xl shadow-sm">
                      <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">哪個脈位獨異？</h2>
                      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                        {['心火', '肝木', '腎水', '肺金', '脾土', '命門'].map(p => (
                          <button key={p} onClick={() => setTangyePulse(p)} className={`py-2 px-3 rounded-lg border transition-all ${tangyePulse === p ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>{p}</button>
                        ))}
                      </div>
                    </section>
                    {tangyePulse && (
                      <section className="bg-white p-6 rounded-xl shadow-sm animate-in fade-in slide-in-from-bottom-2">
                        <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">該脈位狀態？</h2>
                        <div className="flex gap-4">
                          <button onClick={() => setTangyeState('太過')} className={`flex-1 py-3 rounded-lg border-2 transition-all flex items-center justify-center gap-2 ${tangyeState === '太過' ? 'border-red-500 bg-red-50 text-red-700 font-bold' : 'border-slate-200'}`}><Icons.ArrowRight className="w-4 h-4 -rotate-45" /> 太過</button>
                          <button onClick={() => setTangyeState('不足')} className={`flex-1 py-3 rounded-lg border-2 transition-all flex items-center justify-center gap-2 ${tangyeState === '不足' ? 'border-blue-500 bg-blue-50 text-blue-700 font-bold' : 'border-slate-200'}`}><Icons.ArrowRight className="w-4 h-4 rotate-45" /> 不足</button>
                        </div>
                      </section>
                    )}
                  </div>
                )}

                {isBalanced === false && (
                  <div className="space-y-6 animate-in zoom-in-95 duration-300">
                    <section className="bg-white p-6 rounded-xl shadow-sm">
                      <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">脈位狀態？</h2>
                      <div className="flex gap-4">
                        {['人迎', '脈口'].map(opt => (
                          <button key={opt} onClick={() => handlePulsePosChange(opt)} className={`flex-1 py-3 rounded-lg border-2 transition-all ${zhongshiPulsePos === opt ? 'border-purple-500 bg-purple-50 text-purple-700 font-bold' : 'border-slate-200'}`}>{opt}</button>
                        ))}
                      </div>
                    </section>
                    {zhongshiPulsePos && (
                      <section className="bg-white p-6 rounded-xl shadow-sm animate-in fade-in slide-in-from-bottom-2">
                        <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">是否為躁？</h2>
                        <div className="flex gap-4">
                           <button onClick={() => handleAgitatedChange('yes')} className={`flex-1 py-3 rounded-lg border-2 transition-all ${isAgitated === 'yes' ? 'border-red-500 bg-red-50 text-red-700 font-bold' : 'border-slate-200'}`}>是</button>
                           <button onClick={() => handleAgitatedChange('no')} className={`flex-1 py-3 rounded-lg border-2 transition-all ${isAgitated === 'no' ? 'border-green-500 bg-green-50 text-green-700 font-bold' : 'border-slate-200'}`}>否</button>
                        </div>
                      </section>
                    )}
                    {zhongshiPulsePos && isAgitated && (
                      <section className="bg-white p-6 rounded-xl shadow-sm animate-in fade-in slide-in-from-bottom-2">
                        <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">治療原則</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          {zhongshiOptions.map(opt => (
                            <button key={opt} onClick={() => setZhongshiTreatment(opt)} className={`p-4 rounded-lg border text-left transition-all ${zhongshiTreatment === opt ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white border-slate-200 hover:bg-slate-50'}`}>{opt}</button>
                          ))}
                        </div>
                      </section>
                    )}
                  </div>
                )}

                {result && (
                  <div className="mt-8 animate-in slide-in-from-bottom-8 duration-700">
                    <h3 className="text-2xl font-bold text-slate-800 mb-4 border-b pb-2">針灸處方</h3>
                    <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                      <div className="bg-indigo-900 text-white p-4">
                        <div className="flex justify-between items-center">
                           <h4 className="text-lg font-bold">{result.method}</h4>
                           <span className="bg-white/20 px-3 py-1 rounded-full text-sm">{result.title}</span>
                        </div>
                      </div>
                      <div className="p-6">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                          {displayActions.map((action, idx) => {
                            const isTonify = action.type === 'tonify';
                            return (
                              <div key={idx} className={`${isTonify ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'} border-l-4 p-4 rounded-r-lg`}>
                                <h5 className={`font-bold ${isTonify ? 'text-green-800' : 'text-red-800'} flex items-center gap-2 mb-2`}>
                                  {isTonify ? <Icons.ArrowRight className="w-5 h-5" /> : <Icons.RotateCcw className="w-5 h-5" />}
                                  {isTonify ? '補法 (Tonify)' : '瀉法 (Sedate)'}
                                </h5>
                                <div className="text-lg font-bold mb-1">
                                  {action.side === 'left' ? '左' : '右'}
                                  {action.alias ? `${action.point}/${action.alias}` : action.point}
                                </div>
                                <p className={`${isTonify ? 'text-green-700' : 'text-red-700'} text-sm leading-relaxed`}>{action.desc}</p>
                              </div>
                            );
                          })}
                        </div>
                        <div className="bg-slate-100 rounded-xl p-6">
                           <h5 className="flex items-center gap-2 text-slate-700 font-bold mb-4 border-b border-slate-200 pb-2"><Icons.MapPin className="w-5 h-5" /> 穴位定位提示</h5>
                           <div className="grid grid-cols-1 gap-4">
                              {locationHints.map((hint, idx) => (
                                <div key={idx} className="flex gap-3 items-start">
                                  <span className="text-2xl bg-white w-10 h-10 flex items-center justify-center rounded-lg shadow-sm border border-slate-200 shrink-0">{hint.icon}</span>
                                  <div>
                                    <span className="font-bold text-slate-900 block mb-1">{hint.name}</span>
                                    <span className="text-slate-600 text-sm leading-relaxed">{hint.text}</span>
                                  </div>
                                </div>
                              ))}
                           </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        
        // 將主程式包裝在 ErrorBoundary 中，捕捉渲染錯誤
        root.render(
            <ErrorBoundary>
                <AcupunctureTool />
            </ErrorBoundary>
        );

    </script>
</body>
</html>
